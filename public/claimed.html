<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#2F4156">
  <title>PartSmart — Already Claimed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/reward.css">
</head>
<body>

  <div class="claimed-page">

    <div class="claimed-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>

    <div class="glass-card claimed-card">
      <h2>Already Claimed</h2>
      <p>This invoice has already been used to claim a reward. Each invoice can only be used once.</p>

      <div class="claimed-invoice-box">
        <div class="claimed-invoice-label">Invoice Number</div>
        <div class="claimed-invoice-num" id="claimedInvoice">—</div>
      </div>

      <div id="claimedRewardInfo" style="margin-bottom:20px;display:none;">
        <div class="claimed-invoice-label" style="margin-bottom:8px;">Reward Won</div>
        <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--beige);border-radius:12px;">
          <span id="claimedRewardIcon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
          </span>
          <span id="claimedRewardTitle" style="font-weight:700;color:var(--navy);"></span>
        </div>
      </div>

      <a href="/" class="btn btn-primary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Home
      </a>
      <a href="/scratch" class="btn btn-secondary" style="margin-top:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Try Another Invoice
      </a>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/utils.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const invoice = params.get('invoice');
    if (invoice) {
      document.getElementById('claimedInvoice').textContent = invoice;
      fetch(`/api/claim/${encodeURIComponent(invoice)}`)
        .then(r => r.json())
        .then(data => {
          if (data.success && data.claim && data.claim.rewards) {
            document.getElementById('claimedRewardInfo').style.display = 'block';
            document.getElementById('claimedRewardTitle').textContent = data.claim.rewards.title;
          }
        }).catch(() => {});
    }
  </script>
</body>
</html>
